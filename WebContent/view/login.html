<!DOCTYPE html>
<html lang="kr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>
</head>
<body>
	<h1>로그인</h1>
	<form method="post" action="controller?cmd=loginAction">
		<div>
			<div>사업자번호</div>
			<input type="text" name="bId" placeholder="사업자번호 입력">
		</div>
		<div>
			<div>비밀번호</div>
			<input type="password" name="pw" placeholder="비밀번호 입력">
		</div>
		<input type="submit" value="로그인">
	</form>

	<button onclick="location.href='controller?cmd=addUserUI'">회원가입</button>
	<button onclick="location.href='controller?cmd=searchPwUI'">비밀번호찾기</button>
</body>
</html>
